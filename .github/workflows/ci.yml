name: CI

on:
  push:
    branches: [master]
    tags-ignore: ['v*']
  pull_request:
  workflow_call:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          STATUS=0
          for f in *.sh; do
            [ -f "$f" ] || continue
            shellcheck "$f" || STATUS=1
          done
          exit $STATUS

  zip:
    name: Build & verify zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build zip
        run: make zip
      - name: Verify expected files are present
        run: |
          ZIP=$(ls *-v*.zip)
          for f in module.prop customize.sh \
                   system/bin/kexec \
                   META-INF/com/google/android/update-binary \
                   META-INF/com/google/android/updater-script; do
            unzip -l "$ZIP" | grep -q "$f" || { echo "MISSING: $f"; exit 1; }
          done
      - name: Verify excluded files are absent
        run: |
          ZIP=$(ls *-v*.zip)
          for f in .gitignore CLAUDE.md .claude/ .git/ .github/ \
                   Makefile LICENSE README.md \
                   CHANGELOG.md CHECKLIST.md cliff.toml hooks/; do
            if unzip -l "$ZIP" | grep -q "$f"; then
              echo "UNEXPECTED: $f found in zip"; exit 1
            fi
          done
